<!doctype html>

    <header class="app-header">

        <p class="eyebrow">2026.08.01-06 韓國西部之旅</p>
        <h1>旅程資訊網站</h1>

      <p class="header-note">在此理解旅程的完整重點資訊，與使用快速景點位置快速導覽功能</p>

    <main>

        <section class="home-hero">
          <img src="https://commons.wikimedia.org/wiki/Special:FilePath/%EA%B6%81%EB%82%A8%EC%A7%80.jpg" alt="扶餘宮南池水面與亭閣">
          <div class="home-hero-text">
            <p class="eyebrow">West Korea Road Trip</p>
            <h2>韓國西部之旅</h2>
            <p>百濟古都、城牆、市場、海港與江華島，把每天的目的地先看懂，再用導航出發。</p>
          </div>
        </section>

        <div class="mode-cards">
          <button class="mode-card story-mode-card" type="button" data-mode-target="story">
            <span>旅程總覽</span>
            <strong>每日行程重點</strong>
            <small>每日行程、重點景點、代表照片與簡短介紹。</small>
          </button>
          <button class="mode-card nav-mode-card" type="button" data-mode-target="nav">
            <span>快速導航</span>
            <strong>景點地圖導航</strong>
            <small>住宿、景點、美食、停車搜尋與日期篩選。</small>
          </button>
        </div>

        <a class="pdf-download" href="https://drive.google.com/file/d/1QOTV1rbUWJ4XyLKxHLtRor6o1uXU_yfi/view?usp=sharing" target="_blank" rel="noopener">
          <span>行程 PDF</span>
          <strong>下載完整行程 PDF</strong>
          <small>2026.08.數位人文團韓國西岸行 v1.1</small>
        </a>
      </section>

      <section id="storyView" class="mode-view story-view" hidden>
        <nav class="mode-switcher" aria-label="功能切換">
          <button type="button" data-mode-target="home">首頁</button>
          <button class="active" type="button" data-mode-target="story">旅程總覽</button>
          <button type="button" data-mode-target="nav">快速導航</button>
        </nav>
        <section class="story-intro">
          <p class="eyebrow">旅程理解模式</p>
          <h2>每日行程重點</h2>
        </section>
        <section class="story-toolbar" aria-label="篩選總覽地點">
          <div class="filter-row" role="group" aria-label="總覽類型篩選">
            <button class="story-filter-chip active" type="button" data-story-filter="all">全部</button>
            <button class="story-filter-chip stay-filter" type="button" data-story-filter="stay">住宿</button>
            <button class="story-filter-chip spot-filter" type="button" data-story-filter="spot">景點</button>

          <div class="date-row" role="group" aria-label="總覽日期篩選">
            <button class="story-date-chip active" type="button" data-story-date="all">全部日期</button>
            <button class="story-date-chip" type="button" data-story-date="8/1">8/1</button>
            <button class="story-date-chip" type="button" data-story-date="8/2">8/2</button>
            <button class="story-date-chip" type="button" data-story-date="8/3">8/3</button>

            <button class="story-date-chip" type="button" data-story-date="8/5">8/5</button>

          <button type="button" data-mode-target="home">首頁</button>
          <button type="button" data-mode-target="story">旅程總覽</button>
          <button class="active" type="button" data-mode-target="nav">快速導航</button>
        </nav>
        <section class="toolbar" aria-label="篩選地點">
          <div class="search-wrap">
            <label for="searchInput">搜尋</label>
            <input id="searchInput" type="search" placeholder="輸入城市、地點、韓文">

          <div class="filter-row" role="group" aria-label="類型篩選">

            <button class="filter-chip stay-filter" type="button" data-filter="stay">住宿</button>

            <button class="date-chip" type="button" data-date="8/1">8/1</button>
            <button class="date-chip" type="button" data-date="8/2">8/2</button>

    </footer>
